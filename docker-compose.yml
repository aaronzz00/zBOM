version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zbom-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zbom
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
